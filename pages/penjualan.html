<div class="page">

  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="title">Total Transaksi</div>
      <div class="value" id="totalTransaksi">0</div>
    </div>

    <div class="kpi-card">
      <div class="title">Total Qty</div>
      <div class="value" id="totalQty">0</div>
    </div>

    <div class="kpi-card">
      <div class="title">Produk Terlaris</div>
      <div class="value" id="produkTop">-</div>
    </div>

    <div class="kpi-card">
      <div class="title">Omzet</div>
      <div class="value" id="totalOmzet">0</div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-container">
    <table id="tablePenjualan" class="display">
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>No PO</th>
          <th>Outlet</th>
          <th>Produk</th>
          <th>Qty</th>
          <th>SKU</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

</div>
